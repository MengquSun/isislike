# Netlify — deploy the React frontend (base directory: frontend/)
# Backend must run separately (see DEPLOY.md / render.yaml), e.g. Render.com

[build]
  base = "frontend"
  command = "npm ci && npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"
  NODE_OPTIONS = "--max-old-space-size=4096"
  # Baked into the JS bundle at build time (optional if /api proxy below is used)
  VITE_CHEMINFORMATICS_API_URL = "https://isislike.onrender.com"

# Proxy API to Render (same-origin /api → no CORS; structure.svg must not hit SPA)
[[redirects]]
  from = "/api/*"
  to = "https://isislike.onrender.com/api/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/api/molecules/*/structure.svg"
  to = "https://isislike.onrender.com/api/molecules/:splat/structure.svg"
  status = 200
  force = true

# SPA: client-side routes fall back to index.html (must be after /api)
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
